<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onevima - Professional editor</title>
    
    <!-- SYSTEM CORE -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    
    <!-- ASSETS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1e1e1e; /* Vegas Style Grey */
            --bg-panel: #2d2d2d;
            --bg-input: #121212;
            --accent: #00bfff; /* Deep Sky Blue */
            --border: #3e3e3e;
            --text: #d4d4d4;
            --track-v: #2a3a40;
            --clip-v: #3a5f6e;
            --playhead: #ff4d4d;
        }

        * { box-sizing: border-box; user-select: none; outline: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; background: #222; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        body {
            margin: 0; background: var(--bg-dark); color: var(--text);
            font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- MENU BAR --- */
        .menubar {
            height: 35px; background: #333; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #111; font-size: 0.8rem;
        }
        .brand { font-weight: 700; color: var(--text); margin-right: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-item { margin-right: 15px; cursor: pointer; color: #aaa; transition: 0.2s; }
        .menu-item:hover { color: white; }
        .export-btn { margin-left: auto; background: var(--accent); color: black; padding: 4px 15px; border-radius: 2px; font-weight: 700; cursor: pointer; border: none; }

        /* --- WORKSPACE GRID --- */
        .workspace { flex: 1; display: grid; grid-template-columns: 350px 1fr 300px; grid-template-rows: 60% 40%; height: calc(100vh - 35px); }

        /* 1. MEDIA POOL (Top Left) */
        .panel-media { grid-column: 1; grid-row: 1; background: var(--bg-panel); border-right: 1px solid #111; border-bottom: 1px solid #111; display: flex; flex-direction: column; }
        .panel-header { background: #252525; padding: 8px 10px; font-size: 0.75rem; font-weight: 700; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .media-list { flex: 1; padding: 10px; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: start; }
        
        .media-item {
            background: #111; border: 1px solid #444; border-radius: 4px; padding: 5px; cursor: pointer; position: relative;
        }
        .media-item:hover { border-color: var(--accent); }
        .media-thumb { width: 100%; height: 80px; background: #000; object-fit: contain; }
        .media-name { font-size: 0.7rem; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 2. PREVIEW (Top Center) */
        .panel-preview { grid-column: 2; grid-row: 1; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #333; border-bottom: 1px solid #111; position: relative; }
        canvas { max-width: 95%; max-height: 90%; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid #333; }
        .timecode { position: absolute; bottom: 10px; right: 20px; font-family: 'Roboto Condensed', monospace; color: var(--accent); font-size: 1.2rem; text-shadow: 0 2px 4px black; }

        /* 3. INSPECTOR (Top Right) */
        .panel-inspector { grid-column: 3; grid-row: 1; background: var(--bg-panel); border-bottom: 1px solid #111; padding: 0; overflow-y: auto; }
        .prop-row { padding: 10px; border-bottom: 1px solid #333; }
        .prop-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input[type=range], input[type=number], select { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 5px; }

        /* 4. TIMELINE (Bottom Full) */
        .panel-timeline { 
            grid-column: 1 / span 3; grid-row: 2; 
            background: #222; display: flex; flex-direction: column; position: relative; 
        }
        
        .timeline-toolbar { 
            height: 30px; background: #2a2a2a; border-bottom: 1px solid #111; 
            display: flex; align-items: center; padding: 0 10px; gap: 15px; 
        }
        .tool-icon { color: #888; cursor: pointer; font-size: 0.9rem; }
        .tool-icon.active { color: var(--accent); }
        .tool-icon:hover { color: white; }

        .tracks-container { flex: 1; overflow-y: auto; overflow-x: auto; position: relative; display: flex; }
        
        /* Headers Column */
        .track-headers { width: 100px; background: #252525; border-right: 1px solid #111; z-index: 10; flex-shrink: 0; }
        .track-header { height: 60px; border-bottom: 1px solid #111; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #666; font-weight: 700; background: #2a2a2a; }

        /* Tracks Area */
        .tracks-area { flex: 1; position: relative; background: #1e1e1e; min-width: 1000px; } /* Min width for scroll */
        .track-lane { height: 60px; border-bottom: 1px solid #333; position: relative; background: var(--track-v); }
        
        /* The Clip Element */
        .clip-block {
            position: absolute; height: 50px; top: 5px; 
            background: var(--clip-v); border: 1px solid #5a7f8e; border-radius: 4px;
            cursor: pointer; overflow: hidden; display: flex; align-items: center; padding: 0 5px;
            color: white; font-size: 0.7rem; opacity: 0.9;
        }
        .clip-block.selected { border: 2px solid var(--accent); background: #4a6f7e; z-index: 5; }

        /* Playhead */
        .ruler { height: 20px; background: #151515; border-bottom: 1px solid #333; display: flex; align-items: flex-end; color: #555; font-size: 0.6rem; padding-left: 10px; position: sticky; top: 0; z-index: 5; }
        
        .playhead-container {
            position: absolute; top: 0; bottom: 0; left: 0; width: 1px; pointer-events: none; z-index: 100;
        }
        .playhead-line { width: 1px; height: 100%; background: var(--playhead); }
        .playhead-cap { 
            width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; 
            border-top: 8px solid var(--playhead); position: absolute; top: 0; left: -5.5px; 
        }

        /* Helpers */
        input[type="file"] { display: none; }
        video { display: none; }
        
        /* Loader */
        .loader-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .terminal { background: #111; color: #0f0; font-family: monospace; padding: 20px; border: 1px solid #333; width: 600px; height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

    <!-- 1. MENU -->
    <div class="menubar">
        <div class="brand">ONEVIMA <span style="color:var(--accent)">Professional editor</span></div>
        <div class="menu-item" onclick="Project.addTrack()">Add Track</div>
        <div class="menu-item" onclick="Timeline.splitClip()">Split (S)</div>
        <div class="menu-item" onclick="Timeline.deleteClip()">Delete (Del)</div>
        <button class="export-btn" onclick="Engine.renderProject()">RENDER AS...</button>
    </div>

    <!-- 2. WORKSPACE -->
    <div class="workspace">
        
        <!-- MEDIA POOL -->
        <div class="panel-media">
            <div class="panel-header">
                <span>PROJECT MEDIA</span>
                <i class="fas fa-plus" style="cursor:pointer" onclick="document.getElementById('upl').click()"></i>
            </div>
            <div class="media-list" id="mediaBin">
                <!-- Items go here -->
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="panel-preview">
            <canvas id="cvs"></canvas>
            <div class="timecode" id="timecode">00:00:00</div>
        </div>

        <!-- INSPECTOR -->
        <div class="panel-inspector" id="inspector">
            <div class="panel-header">PROPERTIES</div>
            <div style="padding:20px; text-align:center; color:#555">Select a clip to edit</div>
        </div>

        <!-- TIMELINE -->
        <div class="panel-timeline">
            <div class="timeline-toolbar">
                <i class="fas fa-backward" onclick="Transport.seek(0)"></i>
                <i class="fas fa-play" id="playBtn" onclick="Transport.toggle()"></i>
                <span style="border-left:1px solid #444; height:15px; margin:0 5px"></span>
                <i class="fas fa-cut tool-icon" title="Split (S)" onclick="Timeline.splitClip()"></i>
                <i class="fas fa-trash tool-icon" title="Delete" onclick="Timeline.deleteClip()"></i>
                <div style="margin-left:auto; font-size:0.7rem; color:#666">ZOOM</div>
                <input type="range" min="10" max="100" value="20" style="width:100px" oninput="Timeline.setZoom(this.value)">
            </div>
            
            <div class="tracks-container" id="timelineScroll">
                <div class="track-headers" id="trackHeaders">
                    <!-- Headers Generated JS -->
                </div>
                <div class="tracks-area" id="trackArea" onclick="Transport.scrub(event)">
                    <div class="ruler" id="ruler"></div>
                    <div class="playhead-container" id="playhead">
                        <div class="playhead-cap"></div>
                        <div class="playhead-line"></div>
                    </div>
                    <!-- Tracks Generated JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- SOURCES & LOADERS -->
    <input type="file" id="upl" accept="video/*, image/*" multiple>
    <div class="loader-modal" id="loader">
        <h2 style="color:white; font-family:'Roboto Condensed'">RENDERING PIPELINE</h2>
        <div class="terminal" id="logs">Initializing Core...</div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // --- GLOBAL CONSTANTS ---
        const PX_PER_SEC = 20; // Default Zoom
        const FPS = 30;

        // --- DATA STRUCTURES ---
        class Clip {
            constructor(id, mediaId, start, duration, offset) {
                this.id = id;
                this.mediaId = mediaId; // Link to source
                this.start = start;     // Timeline position (sec)
                this.duration = duration; // Length (sec)
                this.offset = offset;   // Start time inside the source file (sec)
                // Properties
                this.scale = 1.0;
                this.x = 0; // Center 0
                this.y = 0; // Center 0
                this.opacity = 1.0;
                this.blend = 'normal';
                this.filter = 'none';
            }
        }

        class Track {
            constructor(id, type) {
                this.id = id;
                this.type = type; // 'video' or 'audio'
                this.clips = [];
            }
        }

        // --- STATE MANAGEMENT ---
        const Project = {
            media: {}, // id: { url, file, duration, type }
            tracks: [],
            duration: 60, // Project duration
            currentTime: 0,
            playing: false,
            zoom: 20,
            selectedClipId: null,
            nextId: 1,

            init() {
                // Create Default Tracks
                this.tracks.push(new Track(1, 'video'));
                this.tracks.push(new Track(2, 'video'));
                Timeline.render();
                
                // Load FFmpeg
                (async () => {
                    try { await ffmpeg.load(); console.log("Core Ready"); } 
                    catch(e) { alert("Core Error. Check server."); }
                })();

                // Loop
                requestAnimationFrame(Render.loop);
            },

            addMedia(file) {
                const id = 'media_' + this.nextId++;
                const url = URL.createObjectURL(file);
                const type = file.type.startsWith('image') ? 'image' : 'video';
                
                // Create temp element to get meta
                let el;
                if(type === 'video') {
                    el = document.createElement('video');
                    el.src = url;
                    el.onloadedmetadata = () => {
                        this.media[id] = { id, file, url, duration: el.duration, type, el };
                        UI.addMediaItem(id);
                    };
                } else {
                    el = new Image();
                    el.src = url;
                    el.onload = () => {
                        this.media[id] = { id, file, url, duration: 5, type, el }; // Images default 5s
                        UI.addMediaItem(id);
                    };
                }
            },

            addClipToTrack(mediaId, trackIndex) {
                const media = this.media[mediaId];
                if(!media) return;
                
                const clip = new Clip(
                    'clip_' + this.nextId++,
                    mediaId,
                    this.currentTime, // Insert at playhead
                    media.duration,
                    0 // Start from beginning of file
                );
                
                this.tracks[trackIndex].clips.push(clip);
                Timeline.render();
            },
            
            getClipById(id) {
                for(let t of this.tracks) {
                    const c = t.clips.find(x => x.id === id);
                    if(c) return c;
                }
                return null;
            }
        };

        // --- TIMELINE UI ---
        const Timeline = {
            area: document.getElementById('trackArea'),
            headers: document.getElementById('trackHeaders'),

            render() {
                this.area.innerHTML = `
                    <div class="ruler" id="ruler"></div>
                    <div class="playhead-container" id="playhead" style="left:${Project.currentTime * Project.zoom}px">
                        <div class="playhead-cap"></div><div class="playhead-line"></div>
                    </div>
                `;
                this.headers.innerHTML = '<div style="height:20px; background:#222"></div>'; // Spacer for ruler

                Project.tracks.forEach((track, idx) => {
                    // Header
                    const h = document.createElement('div');
                    h.className = 'track-header';
                    h.innerText = `TRACK ${track.id}`;
                    h.onclick = () => this.addActiveClip(idx); // Quick hack to add clip
                    this.headers.appendChild(h);

                    // Lane
                    const lane = document.createElement('div');
                    lane.className = 'track-lane';
                    lane.style.width = (Project.duration * Project.zoom) + 'px';
                    lane.ondragover = e => e.preventDefault();
                    lane.ondrop = e => {
                        const mid = e.dataTransfer.getData('media');
                        if(mid) Project.addClipToTrack(mid, idx);
                    };

                    // Clips
                    track.clips.forEach(clip => {
                        const el = document.createElement('div');
                        el.className = 'clip-block';
                        if(clip.id === Project.selectedClipId) el.classList.add('selected');
                        
                        // Positioning
                        el.style.left = (clip.start * Project.zoom) + 'px';
                        el.style.width = (clip.duration * Project.zoom) + 'px';
                        
                        const m = Project.media[clip.mediaId];
                        el.innerText = m ? m.file.name : 'Unknown';
                        
                        el.onclick = (e) => { e.stopPropagation(); UI.selectClip(clip.id); };
                        lane.appendChild(el);
                    });

                    this.area.appendChild(lane);
                });
            },

            updatePlayhead() {
                const ph = document.getElementById('playhead');
                if(ph) ph.style.left = (Project.currentTime * Project.zoom) + 'px';
            },

            setZoom(val) {
                Project.zoom = parseInt(val);
                this.render();
            },

            splitClip() {
                if(!Project.selectedClipId) return;
                // Find clip
                let targetTrack = null;
                let targetClip = null;
                let trackIdx = -1;

                Project.tracks.forEach((t, i) => {
                    const c = t.clips.find(x => x.id === Project.selectedClipId);
                    if(c) { targetTrack = t; targetClip = c; trackIdx = i; }
                });

                if(!targetClip) return;

                // Check if playhead is inside clip
                const ct = Project.currentTime;
                if(ct > targetClip.start && ct < targetClip.start + targetClip.duration) {
                    const splitPoint = ct - targetClip.start; // Time relative to clip start
                    
                    // Create second part
                    const newClip = new Clip(
                        'clip_' + Project.nextId++,
                        targetClip.mediaId,
                        ct, // Starts at playhead
                        targetClip.duration - splitPoint, // Remainder
                        targetClip.offset + splitPoint // Offset shifts
                    );
                    
                    // Copy props
                    newClip.x = targetClip.x; newClip.y = targetClip.y; newClip.scale = targetClip.scale;

                    // Update first part
                    targetClip.duration = splitPoint;

                    targetTrack.clips.push(newClip);
                    UI.selectClip(null);
                    this.render();
                }
            },

            deleteClip() {
                if(!Project.selectedClipId) return;
                Project.tracks.forEach(t => {
                    t.clips = t.clips.filter(c => c.id !== Project.selectedClipId);
                });
                UI.selectClip(null);
                this.render();
            }
        };

        // --- UI & INSPECTOR ---
        const UI = {
            addMediaItem(id) {
                const m = Project.media[id];
                const div = document.createElement('div');
                div.className = 'media-item';
                div.draggable = true;
                div.innerHTML = `
                    <div class="media-name">${m.file.name}</div>
                    <div style="font-size:0.6rem; color:#666">${m.type}</div>
                `;
                // Setup Drag
                div.ondragstart = e => e.dataTransfer.setData('media', id);
                div.onclick = () => {
                    // Preview in bin? No, just simple add
                    // For simplicity in this demo: Clicking adds to Track 1
                    Project.addClipToTrack(id, 0); 
                };
                document.getElementById('mediaBin').appendChild(div);
            },

            selectClip(id) {
                Project.selectedClipId = id;
                Timeline.render();
                
                const panel = document.getElementById('inspector');
                if(!id) {
                    panel.innerHTML = '<div class="panel-header">PROPERTIES</div><div style="padding:20px; color:#555">No selection</div>';
                    return;
                }

                const clip = Project.getClipById(id);
                panel.innerHTML = `
                    <div class="panel-header">CLIP: ${id}</div>
                    <div class="prop-row"><div class="prop-label">Scale</div>
                        <input type="range" min="0.1" max="3" step="0.1" value="${clip.scale}" oninput="UI.updateClipProp('${id}', 'scale', this.value)">
                    </div>
                    <div class="prop-row"><div class="prop-label">Position X</div>
                        <input type="range" min="-500" max="500" value="${clip.x}" oninput="UI.updateClipProp('${id}', 'x', this.value)">
                    </div>
                    <div class="prop-row"><div class="prop-label">Position Y</div>
                        <input type="range" min="-500" max="500" value="${clip.y}" oninput="UI.updateClipProp('${id}', 'y', this.value)">
                    </div>
                    <div class="prop-row"><div class="prop-label">Opacity</div>
                        <input type="range" min="0" max="1" step="0.1" value="${clip.opacity}" oninput="UI.updateClipProp('${id}', 'opacity', this.value)">
                    </div>
                    <div class="prop-row"><div class="prop-label">Blend Mode</div>
                        <select onchange="UI.updateClipProp('${id}', 'blend', this.value)">
                            <option value="normal" ${clip.blend=='normal'?'selected':''}>Normal</option>
                            <option value="screen" ${clip.blend=='screen'?'selected':''}>Screen</option>
                            <option value="multiply" ${clip.blend=='multiply'?'selected':''}>Multiply</option>
                        </select>
                    </div>
                `;
            },

            updateClipProp(id, prop, val) {
                const clip = Project.getClipById(id);
                if(clip) clip[prop] = (prop === 'blend') ? val : parseFloat(val);
            }
        };

        // --- RENDER ENGINE (CANVAS COMPOSITOR) ---
        const Render = {
            cvs: document.getElementById('cvs'),
            ctx: document.getElementById('cvs').getContext('2d'),
            
            loop() {
                const ctx = Render.ctx;
                const w = Render.cvs.width = 854; // FWVGA Resolution for preview speed
                const h = Render.cvs.height = 480;

                // BG
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);

                // Play Logic
                if(Project.playing) {
                    Project.currentTime += 1/FPS;
                    if(Project.currentTime > Project.duration) Project.playing = false;
                    Timeline.updatePlayhead();
                    
                    // Update Timecode
                    const date = new Date(Project.currentTime * 1000);
                    document.getElementById('timecode').innerText = date.toISOString().substr(11, 8);
                }

                // Render Tracks Bottom-Up
                Project.tracks.forEach(track => {
                    track.clips.forEach(clip => {
                        // Is clip active at current time?
                        if(Project.currentTime >= clip.start && Project.currentTime < clip.start + clip.duration) {
                            const media = Project.media[clip.mediaId];
                            if(media && media.type === 'video') {
                                // Sync video element time
                                const localTime = (Project.currentTime - clip.start) + clip.offset;
                                // Simple sync check to avoid stutter
                                if(Math.abs(media.el.currentTime - localTime) > 0.3) {
                                    media.el.currentTime = localTime;
                                }
                                if(media.el.paused && Project.playing) media.el.play();
                                if(!Project.playing) media.el.pause();

                                Render.drawClip(ctx, media.el, clip, w, h);
                            } 
                            else if (media && media.type === 'image') {
                                Render.drawClip(ctx, media.el, clip, w, h);
                            }
                        }
                    });
                });

                requestAnimationFrame(Render.loop);
            },

            drawClip(ctx, img, props, w, h) {
                ctx.save();
                ctx.globalAlpha = props.opacity;
                ctx.globalCompositeOperation = props.blend; // Blend Modes!

                // Transform
                const dw = w * props.scale;
                const dh = (img.videoHeight ? (img.videoHeight/img.videoWidth)*dw : (img.height/img.width)*dw) || (h*props.scale);
                
                const cx = w/2 + props.x;
                const cy = h/2 + props.y;

                ctx.drawImage(img, cx - dw/2, cy - dh/2, dw, dh);
                ctx.restore();
            }
        };

        const Transport = {
            toggle() { Project.playing = !Project.playing; document.getElementById('playBtn').className = Project.playing ? 'fas fa-pause' : 'fas fa-play'; },
            seek(t) { Project.currentTime = t; Timeline.updatePlayhead(); },
            scrub(e) {
                const rect = document.getElementById('trackArea').getBoundingClientRect();
                const x = e.clientX - rect.left + document.getElementById('trackArea').scrollLeft;
                const t = x / Project.zoom;
                this.seek(t);
            }
        };

        // --- EXPORT COMPILER (THE BRAIN) ---
        // Converts the NLE Timeline into a massive FFmpeg command
        const Engine = {
            async renderProject() {
                const modal = document.getElementById('loader');
                const logs = document.getElementById('logs');
                const log = m => logs.innerHTML += `> ${m}<br>`;
                
                modal.style.display = 'flex';
                Project.playing = false;

                // 1. Gather Inputs
                let inputs = [];
                let filterMap = []; // Stores command parts
                let mediaFiles = Object.values(Project.media);
                
                log(`Preparing ${mediaFiles.length} source files...`);
                
                for (let i = 0; i < mediaFiles.length; i++) {
                    const m = mediaFiles[i];
                    ffmpeg.FS('writeFile', `input_${i}${getExt(m.file.name)}`, await fetchFile(m.file));
                    inputs.push('-i', `input_${i}${getExt(m.file.name)}`);
                    m.index = i; // Save index for mapping
                }

                // 2. Build Filter Complex
                // This is hard. We need to create a chain for every clip, then overlay them.
                // Approach:
                // 1. Process every clip individually (Trim, Scale, Offset) -> Give it a label [v_track_clip]
                // 2. Overlay labels in order.

                let filterComplex = [];
                let streams = []; // Layers to stack

                // Base Layer (Black BG)
                filterComplex.push(`color=c=black:s=1280x720:d=${Project.duration}[base]`);
                streams.push('[base]');

                let clipCount = 0;

                Project.tracks.forEach(track => {
                    track.clips.forEach(clip => {
                        const m = Project.media[clip.mediaId];
                        const inputLabel = `${m.index}:v`;
                        const outLabel = `v_${clipCount}`;
                        
                        // Filters for this clip
                        // 1. Set PTS (Time base)
                        // 2. Trim (Cut source)
                        // 3. Scale & Pos
                        // 4. Delay (Start time) - Achieved via overlay timestamp, but trim logic needs care.
                        
                        // NOTE: In FFmpeg complex filter, we usually trim first, then setpts=PTS-STARTPTS.
                        // Then we use 'overlay' with 'enable' option for timing.
                        
                        const filters = [];
                        
                        // A. Trim
                        filters.push(`trim=${clip.offset}:${clip.offset + clip.duration}`);
                        filters.push(`setpts=PTS-STARTPTS`);
                        
                        // B. Scale
                        // Calculate W/H based on scale prop
                        const w = `iw*${clip.scale}`;
                        filters.push(`scale=${w}:-1`);
                        
                        // C. Position (x/y are offsets from center 640/360)
                        // This handled in overlay step
                        
                        filterComplex.push(`[${inputLabel}]${filters.join(',')}[${outLabel}_raw]`);
                        
                        // Add to stack
                        streams.push({ 
                            label: `[${outLabel}_raw]`, 
                            start: clip.start, 
                            end: clip.start + clip.duration,
                            x: clip.x, 
                            y: clip.y 
                        });
                        
                        clipCount++;
                    });
                });

                // 3. Stacking (Iterative Overlay)
                // Start with [base], overlay clip 1 -> [tmp1], overlay clip 2 -> [tmp2]...
                
                let currentStream = '[base]';
                
                streams.forEach((layer, i) => {
                    if(typeof layer === 'string') return; // Skip base
                    
                    const nextStream = i === streams.length - 1 ? '[v_final]' : `[tmp_${i}]`;
                    
                    // Coordinates: Center + offset
                    // FFmpeg overlay coords: x=(W-w)/2+offX
                    const x = `(W-w)/2+${layer.x}`;
                    const y = `(H-h)/2+${layer.y}`;
                    
                    // Enable option handles timing! This is the magic of Vegas-like render.
                    // enable='between(t,START,END)'
                    
                    // Note: 'enable' works for existing streams. But we trimmed the source to be short (duration).
                    // So if we overlay, we must time the overlay start using 'shortest=0' usually, 
                    // but since we trimmed, we might need to pad using 'tpad' or calculate offsets carefully.
                    // FOR ROBUSTNESS in this single file demo:
                    // We will assume the overlay command handles the timing shift if we use `setpts=PTS-STARTPTS+START_TIME/TB`.
                    
                    // Correction:
                    // Better approach for NLE: Set PTS of the clip to match its timeline start.
                    // [clip] setpts=PTS-STARTPTS + START/TB [shifted];
                    // [base][shifted] overlay=enable='between(t,START,END)'
                    
                    // Re-writing the complex filter step for the current layer:
                    // We need to inject the setpts shift into the previous step or here.
                    // Let's modify the previous step string in `filterComplex`? No, simpler to add a chain.
                    
                    const shiftLabel = layer.label.replace('_raw', '_shift');
                    filterComplex.push(`${layer.label}setpts=PTS-STARTPTS+${layer.start}/TB${shiftLabel}`);
                    
                    filterComplex.push(`${currentStream}${shiftLabel}overlay=x=${x}:y=${y}:enable='between(t,${layer.start},${layer.end})'${nextStream}`);
                    
                    currentStream = nextStream;
                });

                // 4. Execution
                const fullFilter = filterComplex.join(';');
                const cmd = [
                    ...inputs,
                    '-filter_complex', fullFilter,
                    '-map', currentStream,
                    '-c:v', 'libx264', '-preset', 'ultrafast',
                    'master.mp4'
                ];

                log("Encoding (Structure built)...");
                log("Command length: " + fullFilter.length + " chars");

                try {
                    await ffmpeg.run(...cmd);
                    const d = ffmpeg.FS('readFile', 'master.mp4');
                    const u = URL.createObjectURL(new Blob([d.buffer], {type:'video/mp4'}));
                    const a = document.createElement('a'); a.href=u; a.download='onevima_master.mp4'; a.click();
                    log("DONE!");
                } catch(e) {
                    log("ERROR: " + e.message);
                }
            }
        };

        function getExt(name) { return name.substring(name.lastIndexOf('.')); }

        // Start
        document.getElementById('upl').onchange = (e) => {
            for(let f of e.target.files) Project.addMedia(f);
        };
        
        Project.init();

    </script>
</body>
