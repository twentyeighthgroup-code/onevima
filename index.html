<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onevima 1.5 - Live Studio</title>
    
    <!-- Dependencies -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.0/nouislider.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.0/nouislider.min.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --panel: #18181b;
            --border: #27272a;
            --primary: #ec4899; /* Pink-600 */
            --primary-hover: #db2777;
            --text: #fafafa;
            --dim: #71717a;
        }

        * { box-sizing: border-box; outline: none; user-select: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .toolbar { height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }
        .history-controls i { padding: 8px; cursor: pointer; color: var(--dim); transition: 0.2s; }
        .history-controls i:hover { color: white; }
        
        .btn-export { background: var(--primary); color: white; border: none; padding: 8px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-export:hover { background: var(--primary-hover); box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
        .btn-export:disabled { background: #333; opacity: 0.5; cursor: not-allowed; box-shadow: none; }

        /* WORKSPACE */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR (Tools) */
        .sidebar { width: 70px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 15px; z-index: 10; }
        .tool-btn { width: 45px; height: 45px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--dim); cursor: pointer; transition: 0.2s; font-size: 0.7rem; gap: 4px; }
        .tool-btn i { font-size: 1.1rem; }
        .tool-btn:hover { background: #27272a; color: white; }
        .tool-btn.active { background: var(--primary); color: white; }

        /* PREVIEW AREA */
        .stage { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .canvas-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        canvas { max-width: 90%; max-height: 80%; border: 1px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.6); }

        /* TIMELINE & MIXER */
        .timeline-panel { height: 180px; background: var(--panel); border-top: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .transport-bar { display: flex; justify-content: center; align-items: center; gap: 20px; color: var(--dim); margin-bottom: 5px; }
        .transport-bar i { font-size: 1.2rem; cursor: pointer; color: white; }
        .transport-bar i:hover { color: var(--primary); }
        
        .track-labels { display: flex; gap: 10px; font-size: 0.8rem; color: var(--dim); margin-bottom: 5px; }
        
        /* INSPECTOR (Right Panel) */
        .inspector { width: 320px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .inspector-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 0.9rem; text-transform: uppercase; color: var(--dim); }
        .inspector-content { padding: 20px; overflow-y: auto; flex: 1; }
        
        /* Widgets */
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #a1a1aa; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); height: 4px; }
        select, input[type="text"], input[type="color"] { width: 100%; background: #27272a; border: 1px solid #3f3f46; color: white; padding: 8px; border-radius: 6px; }
        
        .sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .sticker-item { font-size: 1.5rem; background: #27272a; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; }
        .sticker-item:hover { background: #3f3f46; }

        .rec-btn { width: 100%; padding: 15px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .rec-btn.recording { animation: pulse 1s infinite; background: #991b1b; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Hidden inputs */
        input[type="file"] { display: none; }

        /* Loader */
        .loader { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .console { width: 600px; height: 150px; background: #111; color: #10b981; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; padding: 10px; overflow-y: auto; border-radius: 6px; margin-top: 20px; }

        /* Video Sources */
        #srcVideo { display: none; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="logo"><i class="fas fa-layer-group"></i> Onevima <span>1.5</span></div>
        <div class="history-controls">
            <i class="fas fa-undo" onclick="App.undo()" title="Отменить (Ctrl+Z)"></i>
            <i class="fas fa-redo" onclick="App.redo()" title="Вернуть (Ctrl+Y)"></i>
        </div>
        <button class="btn-export" id="exportBtn" onclick="App.render()">ЭКСПОРТ</button>
    </div>

    <div class="layout">
        <!-- TOOLBAR -->
        <div class="sidebar">
            <div class="tool-btn active" onclick="UI.setTab('files')"><i class="fas fa-folder-open"></i>Файл</div>
            <div class="tool-btn" onclick="UI.setTab('layers')"><i class="fas fa-images"></i>Слои</div>
            <div class="tool-btn" onclick="UI.setTab('stickers')"><i class="fas fa-smile"></i>Стикеры</div>
            <div class="tool-btn" onclick="UI.setTab('audio')"><i class="fas fa-microphone"></i>Аудио</div>
            <div class="tool-btn" onclick="UI.setTab('chroma')"><i class="fas fa-user-astronaut"></i>Хрома</div>
        </div>

        <!-- STAGE -->
        <div class="stage">
            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
            
            <div class="timeline-panel">
                <div class="transport-bar">
                    <i class="fas fa-step-backward" onclick="App.seek(0)"></i>
                    <i class="fas fa-play" id="playBtn" onclick="App.togglePlay()"></i>
                    <span id="timeDisplay">00:00</span>
                </div>
                <!-- Timeline Slider -->
                <div id="timeline" style="margin-top:10px;"></div>
                <div style="font-size:0.75rem; color:#555; text-align:center; margin-top:5px;">Двойной слайдер для обрезки</div>
            </div>
        </div>

        <!-- INSPECTOR -->
        <div class="inspector">
            <div class="inspector-header" id="panelTitle">Свойства</div>
            <div class="inspector-content" id="panelContent">
                <!-- Dynamic Content via JS -->
            </div>
        </div>
    </div>

    <!-- Hidden Logic -->
    <video id="srcVideo" crossorigin="anonymous"></video>
    <input type="file" id="uplVid" accept="video/*">
    <input type="file" id="uplImg" accept="image/*">
    
    <div class="loader" id="loader">
        <h2 style="color:white">Рендеринг...</h2>
        <div class="console" id="logs"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // --- CONSTANTS ---
        const STICKERS = ['🔥','😎','💯','🎬','🔴','⚠️','✅','🎵','❤️','⭐','👋','🚀'];

        // --- ENGINE ---
        const App = {
            state: {
                video: null,
                duration: 0,
                playing: false,
                currentTime: 0,
                trim: { s: 0, e: 0 },
                // Layers
                layers: [], // { type: 'text'|'sticker', content: '', x: 50, y: 50, scale: 1 }
                // Features
                chroma: { active: false, similarity: 0.1, blend: 0.1 },
                voiceover: { blob: null, url: null, active: false },
                audio: { volVideo: 1, volMic: 1 },
                // History
                history: [],
                historyStep: -1
            },
            
            canvas: document.getElementById('canvas'),
            ctx: document.getElementById('canvas').getContext('2d'),
            vid: document.getElementById('srcVideo'),

            init() {
                // Resize Canvas
                this.canvas.width = 1280;
                this.canvas.height = 720;
                this.drawEmpty();

                // UI Listeners
                document.getElementById('uplVid').addEventListener('change', e => this.loadVideo(e.target.files[0]));
                
                // Timeline
                this.slider = document.getElementById('timeline');
                noUiSlider.create(this.slider, { start: [0, 100], connect: true, range: { min: 0, max: 100 } });
                this.slider.noUiSlider.on('update', (v) => {
                    this.state.trim.s = parseFloat(v[0]);
                    this.state.trim.e = parseFloat(v[1]);
                });

                // Keybinds
                document.addEventListener('keydown', (e) => {
                    if(e.ctrlKey && e.key === 'z') this.undo();
                    if(e.ctrlKey && e.key === 'y') this.redo();
                });

                this.saveState(); // Init history
                this.loop();
                UI.setTab('files');
            },

            loadVideo(file) {
                if(!file) return;
                this.state.video = file;
                this.vid.src = URL.createObjectURL(file);
                this.vid.onloadedmetadata = () => {
                    this.state.duration = this.vid.duration;
                    this.slider.noUiSlider.updateOptions({ range: {min:0, max:this.state.duration}, start:[0, this.state.duration] });
                    this.saveState();
                };
            },

            // --- LAYERS SYSTEM ---
            addSticker(emoji) {
                this.state.layers.push({ type: 'sticker', content: emoji, x: 50, y: 50, scale: 60 });
                this.saveState();
            },
            
            // --- CHROMA KEY LOGIC (PREVIEW) ---
            // Simplified for real-time performance (skip pixels)
            applyChroma(ctx, w, h) {
                if(!this.state.chroma.active) return;
                
                const frame = ctx.getImageData(0, 0, w, h);
                const l = frame.data.length / 4;
                const sim = this.state.chroma.similarity * 255; // Threshold

                for (let i = 0; i < l; i+=4) { // Optimization: check every 4th pixel if dragging
                    const r = frame.data[i * 4 + 0];
                    const g = frame.data[i * 4 + 1];
                    const b = frame.data[i * 4 + 2];
                    
                    // Simple Green detection: G is dominant
                    if (g > r + sim && g > b + sim) {
                        frame.data[i * 4 + 3] = 0; // Alpha 0
                    }
                }
                ctx.putImageData(frame, 0, 0);
            },

            // --- RENDER LOOP ---
            loop() {
                if(!this.state.video) { requestAnimationFrame(()=>this.loop()); return; }
                
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                // 1. Draw Video
                ctx.drawImage(this.vid, 0, 0, w, h);

                // 2. Chroma Key Preview (Expensive!)
                // Only run every 2nd frame or optimization needed. 
                // For this demo, we run it.
                if(this.state.chroma.active) this.applyChroma(ctx, w, h);

                // 3. Draw Layers
                this.state.layers.forEach(l => {
                    if(l.type === 'sticker') {
                        ctx.font = `${l.scale}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(l.content, (l.x/100)*w, (l.y/100)*h);
                    }
                });

                // Update UI
                if(this.state.playing) {
                    document.getElementById('timeDisplay').innerText = this.vid.currentTime.toFixed(1);
                    // Trim loop
                    if(this.vid.currentTime >= this.state.trim.e) this.vid.currentTime = this.state.trim.s;
                }

                requestAnimationFrame(()=>this.loop());
            },

            // --- AUDIO RECORDING ---
            async toggleRecord() {
                if(this.recording) {
                    this.mediaRecorder.stop();
                    this.recording = false;
                    UI.renderAudio(false);
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.chunks = [];
                        
                        this.mediaRecorder.ondataavailable = e => this.chunks.push(e.data);
                        this.mediaRecorder.onstop = () => {
                            const blob = new Blob(this.chunks, { type: 'audio/mp3' });
                            this.state.voiceover.blob = blob;
                            this.state.voiceover.url = URL.createObjectURL(blob);
                            this.state.voiceover.active = true;
                            alert("Аудио записано!");
                        };
                        
                        this.mediaRecorder.start();
                        this.recording = true;
                        UI.renderAudio(true);
                    } catch(e) {
                        alert("Нет доступа к микрофону!");
                    }
                }
            },

            // --- HISTORY ---
            saveState() {
                // Deep copy simple state (excluding heavy blobs)
                const snapshot = JSON.stringify({
                    layers: this.state.layers,
                    trim: this.state.trim,
                    chroma: this.state.chroma,
                    audio: this.state.audio
                });
                
                // Remove futures if we went back
                if(this.state.historyStep < this.state.history.length - 1) {
                    this.state.history = this.state.history.slice(0, this.state.historyStep + 1);
                }
                
                this.state.history.push(snapshot);
                this.state.historyStep++;
            },

            undo() {
                if(this.state.historyStep > 0) {
                    this.state.historyStep--;
                    this.restoreState();
                }
            },

            redo() {
                if(this.state.historyStep < this.state.history.length - 1) {
                    this.state.historyStep++;
                    this.restoreState();
                }
            },

            restoreState() {
                const data = JSON.parse(this.state.history[this.state.historyStep]);
                this.state.layers = data.layers;
                this.state.trim = data.trim;
                this.state.chroma = data.chroma;
                this.state.audio = data.audio;
                // Update UI sliders
                this.slider.noUiSlider.set([this.state.trim.s, this.state.trim.e]);
            },

            // --- CONTROLS ---
            togglePlay() {
                if(this.vid.paused) { this.vid.play(); this.state.playing = true; document.getElementById('playBtn').className='fas fa-pause'; }
                else { this.vid.pause(); this.state.playing = false; document.getElementById('playBtn').className='fas fa-play'; }
            },
            seek(t) { this.vid.currentTime = t; },
            drawEmpty() { 
                this.ctx.fillStyle = '#111'; this.ctx.fillRect(0,0,1280,720); 
                this.ctx.fillStyle = '#333'; this.ctx.font='30px Arial'; this.ctx.textAlign='center';
                this.ctx.fillText("ONEVIMA 9.0", 640, 360);
            },

            // --- EXPORT (FFMPEG COMPLEX) ---
            async render() {
                const loader = document.getElementById('loader');
                const logEl = document.getElementById('logs');
                const log = m => logEl.innerHTML += `> ${m}<br>`;
                
                loader.style.display = 'flex';
                this.vid.pause();
                
                if(!ffmpeg.isLoaded()) await ffmpeg.load();

                // 1. Write Video
                log("Запись видео...");
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(this.state.video));
                let inputs = ['-i', 'in.mp4'];
                let inputIdx = 1;

                // 2. Write Voiceover
                if(this.state.voiceover.active) {
                    log("Запись озвучки...");
                    ffmpeg.FS('writeFile', 'voice.mp3', await fetchFile(this.state.voiceover.blob));
                    inputs.push('-i', 'voice.mp3');
                    inputIdx++;
                }

                // 3. Filter Graph
                let chain = '[0:v]';
                let filters = [];

                // Chroma Key Filter
                if(this.state.chroma.active) {
                    // similarity, blend
                    filters.push(`${chain}chromakey=0x00FF00:${this.state.chroma.similarity}:${this.state.chroma.blend}[v_chroma]`);
                    chain = '[v_chroma]';
                }

                // Trim Filter
                filters.push(`${chain}trim=${this.state.trim.s}:${this.state.trim.e},setpts=PTS-STARTPTS[v_trim]`);
                chain = '[v_trim]';

                // Stickers (DrawText can emulate emojis on some systems, but better to use drawtext)
                // Note: FFmpeg drawtext with emojis is tricky without specific font.
                // For stability in WebAssembly, we will use simplified logic or assume user understands system fonts.
                // We will skip sticker rendering in FFmpeg for this MVP code block to prevent errors (requires font file upload).
                // Instead, we focus on Audio Mixing which is robust.

                // Audio Mixing
                let audioChain = '';
                // Video Audio Trim
                filters.push(`[0:a]atrim=${this.state.trim.s}:${this.state.trim.e},asetpts=PTS-STARTPTS,volume=${this.state.audio.volVideo}[a_vid]`);
                
                if(this.state.voiceover.active) {
                    // Mix Voice + Video
                    filters.push(`[1:a]volume=${this.state.audio.volMic}[a_mic]`);
                    filters.push(`[a_vid][a_mic]amix=inputs=2:duration=first[a_out]`);
                    audioChain = '[a_out]';
                } else {
                    audioChain = '[a_vid]';
                }

                // Command
                const cmd = [
                    ...inputs,
                    '-filter_complex', filters.join(';'),
                    '-map', chain,
                    '-map', audioChain,
                    '-c:v', 'libx264', '-preset', 'ultrafast',
                    'out.mp4'
                ];

                log("Запуск: " + cmd.join(' '));
                try {
                    await ffmpeg.run(...cmd);
                    const data = ffmpeg.FS('readFile', 'out.mp4');
                    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                    const a = document.createElement('a'); a.href = url; a.download = 'onevima_pro.mp4'; a.click();
                    log("Готово!");
                    setTimeout(() => loader.style.display='none', 2000);
                } catch(e) {
                    log("Ошибка: " + e.message);
                }
            }
        };

        // --- UI MANAGER ---
        const UI = {
            setTab(name) {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                event.target.closest('.tool-btn')?.classList.add('active');
                
                const title = document.getElementById('panelTitle');
                const content = document.getElementById('panelContent');
                content.innerHTML = '';

                if(name === 'files') {
                    title.innerText = "Файлы";
                    content.innerHTML = `
                        <div class="control-group">
                            <label>Основное Видео</label>
                            <button class="btn-export" style="width:100%; background:#333" onclick="document.getElementById('uplVid').click()">Открыть</button>
                        </div>
                    `;
                }

                if(name === 'stickers') {
                    title.innerText = "Стикеры";
                    let html = '<div class="sticker-grid">';
                    STICKERS.forEach(s => html += `<div class="sticker-item" onclick="App.addSticker('${s}')">${s}</div>`);
                    html += '</div>';
                    content.innerHTML = html;
                }

                if(name === 'chroma') {
                    title.innerText = "Хромакей";
                    content.innerHTML = `
                        <div class="control-group">
                            <label>Включить (Удалить зеленый)</label>
                            <input type="checkbox" onchange="App.state.chroma.active = this.checked" ${App.state.chroma.active?'checked':''}>
                        </div>
                        <div class="control-group">
                            <label>Чувствительность</label>
                            <input type="range" min="0.01" max="0.5" step="0.01" value="${App.state.chroma.similarity}" oninput="App.state.chroma.similarity=this.value">
                        </div>
                    `;
                }

                if(name === 'audio') {
                    title.innerText = "Микшер";
                    this.renderAudio(App.recording);
                }
            },

            renderAudio(isRec) {
                const content = document.getElementById('panelContent');
                content.innerHTML = `
                    <div class="control-group">
                        <label>Микрофон (Озвучка)</label>
                        <button class="rec-btn ${isRec?'recording':''}" onclick="App.toggleRecord()">
                            ${isRec ? '<i class="fas fa-stop"></i> Стоп' : '<i class="fas fa-microphone"></i> Запись REC'}
                        </button>
                    </div>
                    <div class="control-group">
                        <label>Громкость Видео</label>
                        <input type="range" min="0" max="2" step="0.1" value="${App.state.audio.volVideo}" oninput="App.state.audio.volVideo=this.value">
                    </div>
                    <div class="control-group">
                        <label>Громкость Микрофона</label>
                        <input type="range" min="0" max="2" step="0.1" value="${App.state.audio.volMic}" oninput="App.state.audio.volMic=this.value">
                    </div>
                `;
            }
        };

        App.init();
    </script>
</body>
</html>
