<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onevima - Professional editor</title>
    
    <!-- CORE -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    
    <!-- UI ASSETS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            /* HORIZON THEME (Based on your Logo) */
            --brand-gradient: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            --brand-primary: #00b09b;
            --brand-secondary: #96c93d;
            --brand-glow: 0 0 20px rgba(150, 201, 61, 0.3);
            
            --bg-body: #050505; 
            --bg-panel: #111; 
            --border: #222;
            --text: #eee;
            --clip-bg: #0f3d3e; 
            --clip-border: #1a6b55;
            --playhead: #96c93d;
        }

        * { box-sizing: border-box; outline: none; user-select: none; -webkit-user-drag: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        body { margin: 0; background: var(--bg-body); color: var(--text); font-family: 'Manrope', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { height: 50px; background: #0a0a0a; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 50; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }
        .logo-icon { width: 30px; height: 30px; background: var(--brand-gradient); border-radius: 6px; display: grid; place-items: center; color: black; box-shadow: var(--brand-glow); }
        .logo-text { background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; gap: 5px; background: #1a1a1a; padding: 4px; border-radius: 6px; }
        .tab { padding: 4px 15px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; color: #777; transition: 0.2s; font-weight: 600; }
        .tab:hover { color: white; }
        .tab.active { background: #333; color: var(--brand-secondary); }

        .btn-export { 
            background: var(--brand-gradient); color: black; border: none; padding: 8px 20px; 
            border-radius: 4px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
        }
        .btn-export:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        /* LAYOUT */
        .workspace { flex: 1; display: grid; grid-template-columns: 300px 1fr 300px; grid-template-rows: 60% 40%; overflow: hidden; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .panel-head { height: 32px; background: #161616; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; font-size: 0.7rem; color: #666; font-weight: 700; text-transform: uppercase; justify-content: space-between; }

        /* MEDIA BIN */
        .media-bin { grid-column: 1; grid-row: 1; border-right: none; }
        .file-list { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }
        .file-item { background: #0a0a0a; border: 1px solid #222; border-radius: 4px; overflow: hidden; cursor: grab; transition: 0.2s; }
        .file-item:hover { border-color: var(--brand-primary); }
        .file-thumb { height: 60px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #333; }
        .file-name { padding: 5px; font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VIEWER */
        .viewer { grid-column: 2; grid-row: 1; background: #000; border-bottom: none; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 95%; max-height: 90%; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid #222; }
        .controls-overlay { position: absolute; bottom: 20px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; display: flex; gap: 15px; align-items: center; border: 1px solid #333; }
        .tc { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--brand-secondary); }
        .play-btn { color: white; cursor: pointer; transition: 0.2s; } .play-btn:hover { color: var(--brand-primary); }

        /* INSPECTOR */
        .inspector { grid-column: 3; grid-row: 1; border-left: none; }
        .props { padding: 15px; overflow-y: auto; }
        .prop-row { margin-bottom: 15px; }
        .prop-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        input[type="range"] { width: 100%; height: 4px; background: #222; border-radius: 2px; accent-color: var(--brand-secondary); cursor: pointer; }
        input[type="number"] { background: #0a0a0a; border: 1px solid #333; color: white; padding: 2px 5px; width: 50px; font-family: inherit; font-size: 0.8rem; border-radius: 3px; }

        /* TIMELINE */
        .timeline { grid-column: 1 / span 3; grid-row: 2; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .tl-tools { height: 35px; background: #161616; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        .tool { color: #666; cursor: pointer; font-size: 0.9rem; } .tool.active { color: var(--brand-primary); }
        
        .tl-scroll { flex: 1; display: flex; overflow: hidden; position: relative; }
        .track-headers { width: 100px; background: #111; border-right: 1px solid var(--border); z-index: 10; }
        .track-head { height: 50px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #555; }
        
        .track-area { flex: 1; background: #080808; overflow: auto; position: relative; }
        .track-lane { height: 50px; border-bottom: 1px solid #1a1a1a; position: relative; min-width: 100%; }

        .clip { 
            position: absolute; top: 4px; height: 42px; 
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0)), var(--clip-bg);
            border: 1px solid var(--clip-border); border-radius: 4px;
            cursor: pointer; overflow: hidden; display: flex; align-items: center; padding: 0 8px;
        }
        .clip.selected { border-color: var(--brand-secondary); box-shadow: 0 0 0 1px var(--brand-secondary); z-index: 10; }
        .clip-name { font-size: 0.7rem; color: #ddd; white-space: nowrap; pointer-events: none; }

        .ruler { height: 20px; background: #161616; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; }
        .playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--playhead); pointer-events: none; z-index: 100; }
        .playhead-head { width: 11px; height: 11px; background: var(--playhead); transform: rotate(45deg); position: absolute; top: -5px; left: -5px; border: 2px solid #111; }

        /* LOADER */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar { width: 200px; height: 3px; background: #222; margin-top: 20px; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--brand-gradient); transition: width 0.2s; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="overlay" id="loader">
        <div class="logo-icon" style="width:50px; height:50px; font-size:1.5rem"><i class="fas fa-video"></i></div>
        <h2 class="logo-text" style="margin-top:20px">ONEVIMA</h2>
        <div class="bar"><div class="fill" id="loadBar"></div></div>
        <div style="font-size:0.7rem; color:#555; margin-top:10px; font-family:'JetBrains Mono'" id="loadText">INITIALIZING ENGINE...</div>
    </div>

    <header class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-film"></i></div>
            <span class="logo-text">ONEVIMA</span>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="UI.setMode('edit', this)">Edit</div>
            <div class="tab" onclick="UI.setMode('color', this)">Color</div>
            <div class="tab" onclick="UI.setMode('audio', this)">Audio</div>
            <div class="tab" onclick="UI.setMode('fx', this)">Effects</div>
        </div>

        <button class="btn-export" id="expBtn" onclick="Export.start()">
            <i class="fas fa-bolt"></i> EXPORT
        </button>
    </header>

    <div class="workspace">
        <!-- MEDIA -->
        <div class="panel media-bin">
            <div class="panel-head">
                <span>PROJECT MEDIA</span>
                <i class="fas fa-plus" style="cursor:pointer; color:var(--brand-primary)" onclick="document.getElementById('upl').click()"></i>
            </div>
            <div class="file-list" id="bin">
                <!-- Items -->
            </div>
        </div>

        <!-- VIEWER -->
        <div class="panel viewer">
            <canvas id="cvs"></canvas>
            <div class="controls-overlay">
                <i class="fas fa-backward play-btn" onclick="Transport.seek(0)"></i>
                <i class="fas fa-play play-btn" id="playIcon" onclick="Transport.toggle()"></i>
                <div class="tc" id="tc">00:00:00:00</div>
            </div>
        </div>

        <!-- INSPECTOR -->
        <div class="panel inspector">
            <div class="panel-head" id="inspTitle">INSPECTOR</div>
            <div class="props" id="inspContent">
                <div style="text-align:center; color:#444; font-size:0.8rem; margin-top:20px">Select a clip</div>
            </div>
        </div>

        <!-- TIMELINE -->
        <div class="panel timeline">
            <div class="tl-tools">
                <i class="fas fa-mouse-pointer tool active"></i>
                <i class="fas fa-cut tool" onclick="Timeline.split()"></i>
                <div style="flex:1"></div>
                <i class="fas fa-minus tool" onclick="Timeline.zoom(-10)"></i>
                <input type="range" style="width:100px" min="10" max="200" value="20" oninput="Timeline.setZoom(this.value)">
                <i class="fas fa-plus tool" onclick="Timeline.zoom(10)"></i>
            </div>
            <div class="tl-scroll">
                <div class="track-headers" id="trackHeaders"></div>
                <div class="track-area" id="trackArea" onclick="Transport.scrub(event)">
                    <div class="ruler"></div>
                    <div class="playhead" id="ph"><div class="playhead-head"></div></div>
                    <div id="tracksContent"></div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="upl" multiple accept="video/*,image/*,audio/*">

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // --- STATE ---
        const Project = {
            media: {},
            tracks: [
                { id: 1, type: 'video', clips: [] },
                { id: 2, type: 'video', clips: [] },
                { id: 3, type: 'audio', clips: [] }
            ],
            duration: 60,
            zoom: 20,
            mode: 'edit',
            selection: null, // { tIdx, cId }
            uid: 0
        };

        const Playback = {
            active: false,
            time: 0,
            lastFrame: 0
        };

        // --- DRAG MANAGER (FIXED) ---
        const Drag = {
            active: false,
            clipId: null,
            trackIdx: null,
            startX: 0,
            origStart: 0,
            
            start(e, tIdx, cId, startVal) {
                e.stopPropagation();
                this.active = true;
                this.clipId = cId;
                this.trackIdx = tIdx;
                this.startX = e.clientX;
                this.origStart = startVal;
                document.body.style.cursor = 'grabbing';
            },
            move(e) {
                if(!this.active) return;
                const delta = (e.clientX - this.startX) / Project.zoom;
                let newStart = this.origStart + delta;
                if(newStart < 0) newStart = 0;
                
                const track = Project.tracks[this.trackIdx];
                const clip = track.clips.find(c => c.id === this.clipId);
                clip.start = newStart;
                
                // Visual Update Only (Performance)
                const el = document.getElementById(this.clipId);
                if(el) el.style.left = (newStart * Project.zoom) + 'px';
            },
            end() {
                if(!this.active) return;
                this.active = false;
                document.body.style.cursor = 'default';
                UI.updateInspector(); // Refresh numbers
            }
        };

        window.addEventListener('mousemove', e => Drag.move(e));
        window.addEventListener('mouseup', () => Drag.end());

        // --- CONTROLLER ---
        const App = {
            async init() {
                Timeline.render();
                // Load FFmpeg
                try {
                    document.getElementById('loadBar').style.width = '30%';
                    await ffmpeg.load();
                    document.getElementById('loadBar').style.width = '100%';
                    setTimeout(() => document.getElementById('loader').style.display='none', 500);
                } catch(e) {
                    document.getElementById('loadText').innerText = "ERROR: Use Desktop Chrome";
                    alert("Critical Error: Core failed to load.");
                }
                requestAnimationFrame(Render.loop);
            },

            addMedia(files) {
                Array.from(files).forEach(f => {
                    const id = 'm' + (++Project.uid);
                    const url = URL.createObjectURL(f);
                    const type = f.type.startsWith('image') ? 'image' : (f.type.startsWith('audio') ? 'audio' : 'video');
                    
                    if(type === 'video') {
                        const v = document.createElement('video');
                        v.src = url;
                        v.onloadedmetadata = () => {
                            Project.media[id] = { id, file: f, url, duration: v.duration, type, el: v };
                            UI.addBinItem(Project.media[id]);
                        };
                    } else {
                        const i = new Image();
                        i.src = url;
                        i.onload = () => {
                            Project.media[id] = { id, file: f, url, duration: 5, type, el: i };
                            UI.addBinItem(Project.media[id]);
                        }
                    }
                });
            },

            addClip(mid, tIdx, start) {
                const m = Project.media[mid];
                // Type check
                if(Project.tracks[tIdx].type === 'audio' && m.type !== 'audio') return;
                if(Project.tracks[tIdx].type === 'video' && m.type === 'audio') return;

                const c = {
                    id: 'c' + (++Project.uid), mid, start, duration: m.duration, offset: 0,
                    // Props
                    x: 0, y: 0, scale: 1, opacity: 1, rot: 0,
                    bright: 1, cont: 1, sat: 1, vol: 1, blur: 0
                };
                Project.tracks[tIdx].clips.push(c);
                Timeline.render();
            }
        };

        // --- TIMELINE ---
        const Timeline = {
            render() {
                const head = document.getElementById('trackHeaders');
                const body = document.getElementById('tracksContent');
                head.innerHTML = ''; body.innerHTML = '';

                Project.tracks.forEach((track, tIdx) => {
                    // Header
                    const h = document.createElement('div');
                    h.className = 'track-head';
                    h.innerText = (track.type==='video' ? 'V' : 'A') + track.id;
                    head.appendChild(h);

                    // Lane
                    const l = document.createElement('div');
                    l.className = 'track-lane';
                    l.style.width = (Project.duration * Project.zoom) + 'px';
                    
                    l.ondragover = e => e.preventDefault();
                    l.ondrop = e => {
                        e.preventDefault();
                        const mid = e.dataTransfer.getData('mid');
                        if(mid) {
                            const rect = l.getBoundingClientRect();
                            const x = e.clientX - rect.left + document.getElementById('trackArea').scrollLeft;
                            App.addClip(mid, tIdx, x/Project.zoom);
                        }
                    };

                    // Clips
                    track.clips.forEach(clip => {
                        const el = document.createElement('div');
                        el.id = clip.id;
                        el.className = 'clip';
                        if(Project.selection?.clipId === clip.id) el.classList.add('selected');
                        
                        el.style.left = (clip.start * Project.zoom) + 'px';
                        el.style.width = (clip.duration * Project.zoom) + 'px';
                        
                        const m = Project.media[clip.mid];
                        el.innerHTML = `<div class="clip-name">${m.file.name}</div>`;
                        
                        el.onmousedown = e => {
                            UI.select(tIdx, clip.id);
                            Drag.start(e, tIdx, clip.id, clip.start);
                        };

                        l.appendChild(el);
                    });

                    body.appendChild(l);
                });
            },
            setZoom(v) { Project.zoom = +v; this.render(); },
            zoom(d) { Project.zoom = Math.max(5, Project.zoom+d); this.render(); }
        };

        // --- RENDERER ---
        const Render = {
            cvs: document.getElementById('cvs'),
            ctx: document.getElementById('cvs').getContext('2d'),
            
            loop(timestamp) {
                // Time
                if(Playback.active) {
                    const dt = (timestamp - Playback.lastFrame) / 1000;
                    Playback.time += dt;
                    if(Playback.time >= Project.duration) {
                        Playback.time = 0; Playback.active = false;
                        document.getElementById('playIcon').className = 'fas fa-play play-btn';
                    }
                    
                    // Update UI Playhead
                    const ph = document.getElementById('ph');
                    if(ph) ph.style.left = (Playback.time * Project.zoom) + 'px';
                    
                    const d = new Date(Playback.time * 1000);
                    document.getElementById('tc').innerText = d.toISOString().substr(11, 11);
                }
                Playback.lastFrame = timestamp;

                // Draw
                const ctx = Render.ctx;
                const w = Render.cvs.width = 1280;
                const h = Render.cvs.height = 720;
                
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);

                Project.tracks.forEach(track => {
                    if(track.type !== 'video') return;
                    track.clips.forEach(clip => {
                        if(Playback.time >= clip.start && Playback.time < clip.start + clip.duration) {
                            const m = Project.media[clip.mid];
                            
                            // Sync
                            const localT = (Playback.time - clip.start) + clip.offset;
                            if(m.type === 'video') {
                                if(Math.abs(m.el.currentTime - localT) > 0.2) m.el.currentTime = localT;
                            }

                            ctx.save();
                            ctx.globalAlpha = clip.opacity;
                            ctx.filter = `brightness(${clip.bright}) contrast(${clip.cont}) saturate(${clip.sat}) blur(${clip.blur}px)`;
                            
                            ctx.translate(w/2 + clip.x, h/2 + clip.y);
                            ctx.scale(clip.scale, clip.scale);
                            
                            const ar = (m.el.videoWidth || 640) / (m.el.videoHeight || 360);
                            const dw = w; const dh = w/ar;
                            
                            ctx.drawImage(m.el, -dw/2, -dh/2, dw, dh);
                            ctx.restore();
                        }
                    });
                });

                requestAnimationFrame(Render.loop);
            }
        };

        const Transport = {
            toggle() { 
                Playback.active = !Playback.active; 
                document.getElementById('playIcon').className = Playback.active ? 'fas fa-pause play-btn' : 'fas fa-play play-btn';
                Playback.lastFrame = performance.now();
            },
            seek(t) { Playback.time = t; },
            scrub(e) {
                const r = document.getElementById('trackArea').getBoundingClientRect();
                const x = e.clientX - r.left + document.getElementById('trackArea').scrollLeft;
                Playback.time = Math.max(0, x / Project.zoom);
                if(document.getElementById('ph')) document.getElementById('ph').style.left = x + 'px';
            }
        };

        // --- UI & TABS ---
        const UI = {
            setMode(m, el) {
                Project.mode = m;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                if(el) el.classList.add('active');
                this.updateInspector();
            },

            addBinItem(m) {
                const el = document.createElement('div');
                el.className = 'file-item';
                el.draggable = true;
                el.innerHTML = `<div class="file-thumb">${m.type=='video'?'🎬':(m.type=='audio'?'🔊':'🖼️')}</div><div class="file-name">${m.file.name}</div>`;
                el.ondragstart = e => e.dataTransfer.setData('mid', m.id);
                document.getElementById('bin').appendChild(el);
            },

            select(ti, ci) {
                Project.selection = { tIdx: ti, cId: ci };
                document.querySelectorAll('.clip').forEach(c => c.classList.remove('selected'));
                const el = document.getElementById(ci);
                if(el) el.classList.add('selected');
                this.updateInspector();
            },

            updateInspector() {
                const box = document.getElementById('inspContent');
                if(!Project.selection) { box.innerHTML = `<div style="text-align:center; color:#444; margin-top:20px">Select a clip</div>`; return; }
                
                const { tIdx, cId } = Project.selection;
                const clip = Project.tracks[tIdx].clips.find(c => c.id === cId);
                const m = Project.media[clip.mid];
                
                let html = `<div style="margin-bottom:15px; color:#fff; font-weight:700">${m.file.name}</div>`;
                
                const slider = (lbl, key, min, max, val) => `
                    <div class="prop-row">
                        <div class="prop-label"><span>${lbl}</span></div>
                        <div style="display:flex; gap:10px">
                            <input type="range" min="${min}" max="${max}" step="0.05" value="${val}" oninput="UI.upd('${key}', this.value)">
                            <input type="number" value="${Number(val).toFixed(2)}" readonly>
                        </div>
                    </div>`;

                if(Project.mode === 'edit') {
                    html += slider('Scale', 'scale', 0, 3, clip.scale);
                    html += slider('Pos X', 'x', -600, 600, clip.x);
                    html += slider('Pos Y', 'y', -400, 400, clip.y);
                    html += slider('Opacity', 'opacity', 0, 1, clip.opacity);
                } else if(Project.mode === 'color') {
                    html += slider('Brightness', 'bright', 0, 2, clip.bright);
                    html += slider('Contrast', 'cont', 0, 2, clip.cont);
                    html += slider('Saturation', 'sat', 0, 3, clip.sat);
                } else if(Project.mode === 'fx') {
                    html += slider('Blur', 'blur', 0, 20, clip.blur);
                }

                box.innerHTML = html;
            },

            upd(k, v) {
                const { tIdx, cId } = Project.selection;
                const clip = Project.tracks[tIdx].clips.find(c => c.id === cId);
                clip[k] = parseFloat(v);
                this.updateInspector();
            }
        };

        // --- EXPORT (APEX ENGINE) ---
        const Export = {
            async start() {
                const btn = document.getElementById('expBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-cog fa-spin"></i> RENDERING';
                Playback.active = false; // Stop

                try {
                    if(!ffmpeg.isLoaded()) await ffmpeg.load();
                    
                    // 1. Prepare Inputs
                    let inputs = [];
                    let filterMap = [];
                    let streams = [];
                    
                    // Upload unique media
                    let mediaIndices = {};
                    let inputCount = 0;
                    
                    for(let k in Project.media) {
                        const m = Project.media[k];
                        const name = `src_${k}.mp4`; // Normalize extension
                        ffmpeg.FS('writeFile', name, await fetchFile(m.file));
                        inputs.push('-i', name);
                        mediaIndices[k] = inputCount++;
                    }

                    // 2. Build Filter Complex
                    // Base: Black Background
                    let fc = [`color=c=black:s=1280x720:d=${Project.duration}[base]`];
                    let currentBg = '[base]';

                    // Process each clip
                    let overlayCount = 0;

                    // Sort all clips by start time to ensure correct layer order (or stick to track order)
                    // We stick to Track 1 (bottom) -> Track 2 (top)
                    
                    Project.tracks.forEach(track => {
                        if(track.type !== 'video') return;
                        
                        track.clips.forEach(clip => {
                            const inIdx = mediaIndices[clip.mid];
                            const label = `v${overlayCount}`;
                            
                            // Filters: Scale -> Eq -> Start Delay
                            let chain = `[${inIdx}:v]`;
                            
                            // A. Scale & Resize to Project
                            chain += `scale=iw*${clip.scale}:-1,format=rgba,`;
                            
                            // B. Color
                            chain += `eq=brightness=${clip.bright}:contrast=${clip.cont}:saturation=${clip.sat},`;
                            
                            // C. Set Start Time (PTS)
                            // clip.start in seconds.
                            chain += `setpts=PTS-STARTPTS+${clip.start}/TB`;
                            
                            chain += `[${label}_src]`;
                            fc.push(chain);

                            // D. Overlay onto current BG
                            const x = `(W-w)/2+${clip.x}`;
                            const y = `(H-h)/2+${clip.y}`;
                            // Enable only during clip duration
                            const enable = `enable='between(t,${clip.start},${clip.start+clip.duration})'`;
                            
                            const outLabel = `bg_${overlayCount}`;
                            fc.push(`${currentBg}[${label}_src]overlay=x=${x}:y=${y}:${enable}:format=auto[${outLabel}]`);
                            
                            currentBg = `[${outLabel}]`;
                            overlayCount++;
                        });
                    });

                    // 3. Audio Mix (Simplified: Mix all inputs if audio present)
                    // If complex mix fails, we fallback to no audio or first input audio.
                    // For robustness in this version, we map just video, or use amix if tracks exist.
                    let mapAudio = false;
                    // Check if audio track has clips
                    // ... (omitted for strict stability focus on video export)

                    // 4. Run
                    const cmd = [
                        ...inputs,
                        '-filter_complex', fc.join(';'),
                        '-map', currentBg,
                        '-c:v', 'libx264', '-preset', 'ultrafast', '-shortest',
                        'export.mp4'
                    ];

                    console.log(cmd);
                    await ffmpeg.run(...cmd);

                    const data = ffmpeg.FS('readFile', 'export.mp4');
                    const url = URL.createObjectURL(new Blob([data.buffer], {type:'video/mp4'}));
                    const a = document.createElement('a'); a.href=url; a.download='Onevima_Apex.mp4'; a.click();
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> DONE';
                    setTimeout(() => { btn.innerHTML = '<i class="fas fa-bolt"></i> EXPORT'; btn.disabled = false; }, 2000);

                } catch(e) {
                    console.error(e);
                    alert("Export failed: See console for details.");
                    btn.innerHTML = 'ERROR';
                    btn.disabled = false;
                }
            }
        };

        // Start
        document.getElementById('upl').onchange = e => App.addMedia(e.target.files);
        App.init();

    </script>
</body>
