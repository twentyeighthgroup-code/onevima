<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onevima - Professional editor</title>
    
    <!-- CORE ENGINE -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    
    <!-- ICONS & FONTS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- BRANDING (Teal to Lime) --- */
            --brand-gradient: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            --brand-primary: #00b09b;
            --brand-secondary: #96c93d;
            
            /* --- DARK UI THEME --- */
            --bg-body: #050505; 
            --bg-panel: #111; 
            --border: #222;
            --text-main: #eee;
            --text-muted: #777;
            
            /* --- TIMELINE COLORS --- */
            --track-bg: #0a0a0a;
            --clip-bg: #0f3d3e; 
            --clip-border: #1a6b55;
            --clip-selected: #96c93d;
            --playhead: #96c93d;
        }

        * { box-sizing: border-box; outline: none; user-select: none; }
        body { margin: 0; background: var(--bg-body); color: var(--text-main); font-family: 'Manrope', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER --- */
        .header { 
            height: 50px; background: #080808; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 50; 
        }

        .logo-area { display: flex; align-items: center; gap: 12px; height: 100%; }
        /* Logo Logic: Image takes priority */
        .logo-img { height: 32px; width: auto; display: block; }
        .logo-fallback { 
            height: 32px; width: 32px; background: var(--brand-gradient); border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.2rem;
            display: none; /* Hidden by default, shown via JS if img fails */
        }
        .app-title { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .tabs { display: flex; gap: 5px; background: #161616; padding: 4px; border-radius: 6px; margin-left: 40px; }
        .tab { padding: 4px 16px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; color: #666; font-weight: 600; transition: 0.2s; }
        .tab:hover { color: white; }
        .tab.active { background: #333; color: var(--brand-secondary); }

        .btn-export { 
            background: var(--brand-gradient); color: #000; border: none; padding: 6px 20px; 
            border-radius: 4px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
        }
        .btn-export:hover { opacity: 0.9; }
        .btn-export:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        /* --- WORKSPACE GRID --- */
        .workspace { flex: 1; display: grid; grid-template-columns: 300px 1fr 320px; grid-template-rows: 60% 40%; overflow: hidden; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .panel-head { height: 32px; background: #161616; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; font-size: 0.7rem; color: #888; font-weight: 700; text-transform: uppercase; justify-content: space-between; }

        /* 1. MEDIA BIN */
        .media-bin { grid-column: 1; grid-row: 1; border-right: none; }
        .file-list { flex: 1; padding: 10px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }
        .file-item { background: #0a0a0a; border: 1px solid #222; border-radius: 4px; overflow: hidden; cursor: grab; transition: 0.2s; }
        .file-item:hover { border-color: var(--brand-primary); }
        .file-thumb { height: 60px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #333; }
        .file-name { padding: 5px; font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }

        /* 2. VIEWER */
        .viewer { grid-column: 2; grid-row: 1; background: #000; border-bottom: none; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 95%; max-height: 90%; box-shadow: 0 0 40px rgba(0,0,0,0.6); border: 1px solid #222; }
        .viewer-controls { position: absolute; bottom: 20px; background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 6px 16px; border-radius: 20px; display: flex; gap: 15px; align-items: center; }
        .tc { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--brand-secondary); }
        .v-btn { color: white; cursor: pointer; font-size: 1rem; } .v-btn:hover { color: var(--brand-primary); }

        /* 3. INSPECTOR */
        .inspector { grid-column: 3; grid-row: 1; border-left: none; }
        .props { padding: 20px; overflow-y: auto; }
        .prop-row { margin-bottom: 15px; }
        .prop-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; margin-bottom: 6px; }
        input[type="range"] { width: 100%; height: 4px; background: #222; border-radius: 2px; accent-color: var(--brand-secondary); cursor: pointer; }
        input[type="number"] { background: #0a0a0a; border: 1px solid #333; color: white; padding: 2px 5px; width: 60px; font-family: inherit; font-size: 0.8rem; border-radius: 3px; }

        /* 4. TIMELINE */
        .timeline { grid-column: 1 / span 3; grid-row: 2; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .tl-tools { height: 35px; background: #161616; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        .tool { color: #666; cursor: pointer; font-size: 0.9rem; transition: 0.2s; } .tool:hover { color: white; }
        
        .tl-body { flex: 1; display: flex; position: relative; overflow: hidden; }
        .track-headers { width: 100px; background: #111; border-right: 1px solid var(--border); z-index: 20; display: flex; flex-direction: column; padding-top: 24px; /* Space for ruler */ }
        .track-head { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #555; background: #141414; }

        .track-area { flex: 1; background: var(--track-bg); overflow: auto; position: relative; }
        .ruler { height: 24px; background: #161616; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30; width: 100%; }
        
        .tracks-container { position: relative; min-width: 100%; }
        .track-lane { height: 60px; border-bottom: 1px solid #1a1a1a; position: relative; width: 100%; }

        /* THE CLIP */
        .clip {
            position: absolute; top: 5px; height: 50px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0)), var(--clip-bg);
            border: 1px solid var(--clip-border); border-radius: 4px;
            cursor: grab; overflow: hidden; display: flex; align-items: center; padding: 0 8px;
            z-index: 10;
        }
        .clip:active { cursor: grabbing; }
        .clip.selected { border: 1px solid var(--clip-selected); box-shadow: 0 0 0 1px var(--clip-selected); z-index: 15; }
        .clip-label { font-size: 0.7rem; color: #ddd; pointer-events: none; white-space: nowrap; }

        /* PLAYHEAD */
        .playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--playhead); pointer-events: none; z-index: 50; }
        .playhead-cap { width: 11px; height: 11px; background: var(--playhead); transform: rotate(45deg); position: absolute; top: -5px; left: -5px; border: 2px solid #111; }

        /* LOADER OVERLAY */
        .loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-bar { width: 200px; height: 3px; background: #222; margin-top: 20px; }
        .loader-fill { width: 0%; height: 100%; background: var(--brand-gradient); transition: width 0.3s; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div class="loader" id="loader">
        <h2 style="font-weight:800; color:white; letter-spacing:-1px">ONEVIMA <span style="font-weight:300; color:#666">Professional editor</span></h2>
        <div class="loader-bar"><div class="loader-fill" id="loadFill"></div></div>
        <div style="margin-top:10px; font-size:0.7rem; color:#666; font-family:'JetBrains Mono'" id="loadText">INITIALIZING...</div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-area">
            <!-- LOGO: Tries to load logo.png, falls back to icon if fails -->
            <img src="logo.png" class="logo-img" onerror="this.style.display='none'; document.getElementById('fbLogo').style.display='flex'">
            <div id="fbLogo" class="logo-fallback"><i class="fas fa-video"></i></div>
            <span class="app-title">ONEVIMA</span>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="UI.setTab('edit', this)">Edit</div>
            <div class="tab" onclick="UI.setTab('color', this)">Color</div>
            <div class="tab" onclick="UI.setTab('audio', this)">Audio</div>
            <div class="tab" onclick="UI.setTab('fx', this)">Effects</div>
        </div>

        <button class="btn-export" id="expBtn" onclick="Engine.export()">
            <i class="fas fa-bolt"></i> EXPORT
        </button>
    </header>

    <!-- WORKSPACE -->
    <div class="workspace">
        <!-- 1. MEDIA POOL -->
        <div class="panel media-bin">
            <div class="panel-head">
                <span>Media</span>
                <i class="fas fa-plus" style="cursor:pointer; color:var(--brand-primary)" onclick="document.getElementById('upl').click()"></i>
            </div>
            <div class="file-list" id="bin">
                <div style="grid-column:span 2; border:2px dashed #222; height:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444; font-size:0.7rem; cursor:pointer; border-radius:6px;" onclick="document.getElementById('upl').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size:1.2rem; margin-bottom:5px"></i> Import Files
                </div>
            </div>
        </div>

        <!-- 2. VIEWER -->
        <div class="panel viewer">
            <canvas id="cvs"></canvas>
            <div class="viewer-controls">
                <i class="fas fa-backward v-btn" onclick="Transport.seek(0)"></i>
                <i class="fas fa-play v-btn" id="playIcon" onclick="Transport.toggle()"></i>
                <div class="tc" id="tc">00:00:00:00</div>
            </div>
        </div>

        <!-- 3. INSPECTOR -->
        <div class="panel inspector">
            <div class="panel-head" id="inspTitle">Edit Properties</div>
            <div class="props" id="inspContent">
                <div style="text-align:center; color:#444; margin-top:30px; font-size:0.8rem">Select a clip to edit</div>
            </div>
        </div>

        <!-- 4. TIMELINE -->
        <div class="panel timeline">
            <div class="tl-tools">
                <i class="fas fa-mouse-pointer tool active"></i>
                <div style="flex:1"></div>
                <i class="fas fa-minus tool" onclick="Timeline.zoom(-10)"></i>
                <input type="range" style="width:100px" min="10" max="200" value="20" oninput="Timeline.setZoom(this.value)">
                <i class="fas fa-plus tool" onclick="Timeline.zoom(10)"></i>
            </div>
            <div class="tl-body">
                <div class="track-headers" id="trackHeaders"></div>
                <div class="track-area" id="trackArea" onclick="Transport.scrub(event)">
                    <div class="ruler"></div>
                    <div class="playhead" id="ph"><div class="playhead-cap"></div></div>
                    <div class="tracks-container" id="tracksContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- HIDDEN INPUTS -->
    <input type="file" id="upl" multiple accept="video/*,image/*,audio/*">

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // --- GLOBAL STATE ---
        const Project = {
            media: {},
            tracks: [
                { id: 1, type: 'video', clips: [] },
                { id: 2, type: 'video', clips: [] },
                { id: 3, type: 'audio', clips: [] }
            ],
            duration: 120, // Default project length
            zoom: 20, // Pixels per second
            tab: 'edit',
            selection: null, // { tIdx, cId }
            uid: 0
        };

        const Playback = {
            active: false,
            time: 0,
            lastFrame: 0
        };

        // --- DRAG MANAGER (FIXED & IMPROVED) ---
        const Drag = {
            active: false,
            clipId: null,
            trackIdx: null,
            startX: 0,
            originalStart: 0,
            
            init(e, tIdx, cId, startVal) {
                // Prevent default drag behaviors
                e.preventDefault(); 
                e.stopPropagation();
                
                this.active = true;
                this.clipId = cId;
                this.trackIdx = tIdx;
                this.startX = e.clientX;
                this.originalStart = startVal;
                
                // Set global cursor
                document.body.style.cursor = 'grabbing';
            },

            move(e) {
                if (!this.active) return;
                
                const deltaPx = e.clientX - this.startX;
                const deltaSec = deltaPx / Project.zoom;
                
                let newStart = this.originalStart + deltaSec;
                if (newStart < 0) newStart = 0;
                
                // Update Data Model
                const track = Project.tracks[this.trackIdx];
                const clip = track.clips.find(c => c.id === this.clipId);
                clip.start = newStart;
                
                // Direct DOM update for performance (Smooth 60fps dragging)
                const el = document.getElementById(this.clipId);
                if (el) el.style.left = (newStart * Project.zoom) + 'px';
            },

            end() {
                if (!this.active) return;
                this.active = false;
                document.body.style.cursor = 'default';
                // Trigger an inspector update in case values changed
                UI.renderInspector();
            }
        };

        // Global Drag Listeners
        window.addEventListener('mousemove', e => Drag.move(e));
        window.addEventListener('mouseup', () => Drag.end());

        // --- APP CONTROLLER ---
        const App = {
            async init() {
                Timeline.render(); // Draw initial empty tracks
                
                // Load FFmpeg
                try {
                    document.getElementById('loadFill').style.width = '50%';
                    await ffmpeg.load();
                    document.getElementById('loadFill').style.width = '100%';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
                } catch(e) {
                    console.error(e);
                    document.getElementById('loadText').innerText = "ERROR: USE DESKTOP CHROME";
                    alert("Core Engine Failed. Use Desktop Chrome.");
                }

                // Start Render Loop
                requestAnimationFrame(Render.loop);
            },

            addMedia(files) {
                Array.from(files).forEach(f => {
                    const id = 'm' + (++Project.uid);
                    const url = URL.createObjectURL(f);
                    const type = f.type.startsWith('image') ? 'image' : (f.type.startsWith('audio') ? 'audio' : 'video');
                    
                    const finish = (duration, el) => {
                        Project.media[id] = { id, file: f, url, duration, type, el };
                        UI.addBinItem(Project.media[id]);
                    };

                    if(type === 'video') {
                        const v = document.createElement('video');
                        v.src = url;
                        v.onloadedmetadata = () => finish(v.duration, v);
                    } else if (type === 'audio') {
                        const a = new Audio(url);
                        a.onloadedmetadata = () => finish(a.duration, a);
                    } else {
                        const i = new Image();
                        i.src = url;
                        i.onload = () => finish(5, i); // Images default 5s
                    }
                });
            },

            addClip(mid, tIdx, startTime) {
                const m = Project.media[mid];
                // Simple type check
                if(Project.tracks[tIdx].type === 'audio' && m.type !== 'audio') return;
                if(Project.tracks[tIdx].type === 'video' && m.type === 'audio') return;

                const clip = {
                    id: 'c' + (++Project.uid), mid, start: startTime, duration: m.duration,
                    x: 0, y: 0, scale: 1, opacity: 1, 
                    bright: 1, cont: 1, sat: 1, blur: 0, vol: 1
                };
                
                Project.tracks[tIdx].clips.push(clip);
                Timeline.render();
            }
        };

        // --- TIMELINE RENDERER ---
        const Timeline = {
            render() {
                const head = document.getElementById('trackHeaders');
                const cont = document.getElementById('tracksContainer');
                head.innerHTML = ''; cont.innerHTML = '';
                
                // Set container width
                cont.style.width = (Project.duration * Project.zoom) + 'px';

                Project.tracks.forEach((track, tIdx) => {
                    // Header
                    const h = document.createElement('div');
                    h.className = 'track-head';
                    h.innerText = (track.type === 'video' ? 'V' : 'A') + track.id;
                    head.appendChild(h);

                    // Lane
                    const l = document.createElement('div');
                    l.className = 'track-lane';
                    
                    // Drop Zone Logic
                    l.ondragover = e => e.preventDefault();
                    l.ondrop = e => {
                        e.preventDefault();
                        const mid = e.dataTransfer.getData('mid');
                        if(mid) {
                            const rect = l.getBoundingClientRect();
                            const x = e.clientX - rect.left + document.getElementById('trackArea').scrollLeft;
                            App.addClip(mid, tIdx, Math.max(0, x / Project.zoom));
                        }
                    };

                    // Clips
                    track.clips.forEach(clip => {
                        const el = document.createElement('div');
                        el.id = clip.id;
                        el.className = 'clip';
                        if(Project.selection?.cId === clip.id) el.classList.add('selected');
                        
                        el.style.left = (clip.start * Project.zoom) + 'px';
                        el.style.width = (clip.duration * Project.zoom) + 'px';
                        
                        const m = Project.media[clip.mid];
                        el.innerHTML = `<div class="clip-label">${m.file.name}</div>`;
                        
                        // Drag Start
                        el.onmousedown = (e) => {
                            UI.selectClip(tIdx, clip.id);
                            Drag.init(e, tIdx, clip.id, clip.start);
                        };

                        l.appendChild(el);
                    });

                    cont.appendChild(l);
                });
            },
            
            setZoom(v) { Project.zoom = parseFloat(v); this.render(); },
            zoom(d) { Project.zoom = Math.max(10, Project.zoom + d); this.render(); }
        };

        // --- UI & INSPECTOR ---
        const UI = {
            setTab(tab, el) {
                Project.tab = tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                if(el) el.classList.add('active');
                
                const titles = { edit: 'Edit Properties', color: 'Color Grading', audio: 'Audio Mixer', fx: 'Effects' };
                document.getElementById('inspTitle').innerText = titles[tab];
                this.renderInspector();
            },

            addBinItem(m) {
                const el = document.createElement('div');
                el.className = 'file-item';
                el.draggable = true;
                el.innerHTML = `<div class="file-thumb">${m.type=='video'?'🎬':(m.type=='audio'?'🎵':'🖼️')}</div><div class="file-name">${m.file.name}</div>`;
                el.ondragstart = e => e.dataTransfer.setData('mid', m.id);
                document.getElementById('bin').appendChild(el);
            },

            selectClip(ti, ci) {
                Project.selection = { tIdx: ti, cId: ci };
                // Update visuals without full re-render
                document.querySelectorAll('.clip').forEach(c => c.classList.remove('selected'));
                const el = document.getElementById(ci);
                if(el) el.classList.add('selected');
                this.renderInspector();
            },

            renderInspector() {
                const box = document.getElementById('inspContent');
                if(!Project.selection) { box.innerHTML = `<div style="text-align:center;color:#444;margin-top:20px">Select a clip</div>`; return; }

                const { tIdx, cId } = Project.selection;
                const clip = Project.tracks[tIdx].clips.find(c => c.id === cId);
                const m = Project.media[clip.mid];

                let h = `<div style="margin-bottom:15px; color:#fff; font-weight:700; border-bottom:1px solid #333; padding-bottom:10px">${m.file.name}</div>`;

                const slider = (lbl, prop, min, max, val, step=0.1) => `
                    <div class="prop-row">
                        <div class="prop-label"><span>${lbl}</span></div>
                        <div style="display:flex; gap:10px">
                            <input type="range" min="${min}" max="${max}" step="${step}" value="${val}" oninput="UI.upd('${prop}', this.value)">
                            <input type="number" value="${Number(val).toFixed(2)}" readonly>
                        </div>
                    </div>
                `;

                if(Project.tab === 'edit') {
                    h += slider('Scale', 'scale', 0, 3, clip.scale);
                    h += slider('Position X', 'x', -500, 500, clip.x, 1);
                    h += slider('Position Y', 'y', -500, 500, clip.y, 1);
                    h += slider('Opacity', 'opacity', 0, 1, clip.opacity);
                } else if (Project.tab === 'color') {
                    h += slider('Brightness', 'bright', 0, 2, clip.bright);
                    h += slider('Contrast', 'cont', 0, 2, clip.cont);
                    h += slider('Saturation', 'sat', 0, 3, clip.sat);
                } else if (Project.tab === 'audio') {
                    h += slider('Volume', 'vol', 0, 2, clip.vol);
                } else if (Project.tab === 'fx') {
                    h += slider('Blur (px)', 'blur', 0, 20, clip.blur, 1);
                }

                box.innerHTML = h;
            },

            upd(prop, val) {
                const { tIdx, cId } = Project.selection;
                const clip = Project.tracks[tIdx].clips.find(c => c.id === cId);
                clip[prop] = parseFloat(val);
                this.renderInspector(); // Refresh number inputs
            }
        };

        // --- RENDERER ---
        const Render = {
            cvs: document.getElementById('cvs'),
            ctx: document.getElementById('cvs').getContext('2d'),
            
            loop(now) {
                if(Playback.active) {
                    const dt = (now - Playback.lastFrame) / 1000;
                    Playback.time += dt;
                    if(Playback.time >= Project.duration) {
                        Playback.time = 0; Playback.active = false;
                        document.getElementById('playIcon').className = 'fas fa-play v-btn';
                    }
                }
                Playback.lastFrame = now;

                // Sync Playhead UI
                const ph = document.getElementById('ph');
                if(ph) ph.style.left = (Playback.time * Project.zoom) + 'px';
                const date = new Date(Playback.time * 1000);
                document.getElementById('tc').innerText = date.toISOString().substr(11, 11);

                // Draw Canvas
                const ctx = Render.ctx;
                const w = Render.cvs.width = 1280;
                const h = Render.cvs.height = 720;
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);

                Project.tracks.forEach(track => {
                    if(track.type !== 'video') return;
                    track.clips.forEach(clip => {
                        if(Playback.time >= clip.start && Playback.time < clip.start + clip.duration) {
                            const m = Project.media[clip.mid];
                            // Sync Video Element
                            const localTime = Playback.time - clip.start;
                            if(m.type === 'video') {
                                if(Math.abs(m.el.currentTime - localTime) > 0.2) m.el.currentTime = localTime;
                            }

                            // Draw
                            ctx.save();
                            ctx.globalAlpha = clip.opacity;
                            ctx.filter = `brightness(${clip.bright}) contrast(${clip.cont}) saturate(${clip.sat}) blur(${clip.blur}px)`;
                            ctx.translate(w/2 + clip.x, h/2 + clip.y);
                            ctx.scale(clip.scale, clip.scale);
                            
                            const ar = (m.el.videoWidth || m.el.width) / (m.el.videoHeight || m.el.height) || 1.77;
                            const dw = w; const dh = w/ar;
                            ctx.drawImage(m.el, -dw/2, -dh/2, dw, dh);
                            ctx.restore();
                        }
                    });
                });

                requestAnimationFrame(Render.loop);
            }
        };

        const Transport = {
            toggle() { 
                Playback.active = !Playback.active; 
                Playback.lastFrame = performance.now();
                document.getElementById('playIcon').className = Playback.active ? 'fas fa-pause v-btn' : 'fas fa-play v-btn';
            },
            seek(t) { Playback.time = t; },
            scrub(e) {
                const r = document.getElementById('trackArea').getBoundingClientRect();
                const x = e.clientX - r.left + document.getElementById('trackArea').scrollLeft;
                Playback.time = Math.max(0, x / Project.zoom);
            }
        };

        // --- ENGINE (EXPORT) ---
        const Engine = {
            async export() {
                const btn = document.getElementById('expBtn');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-cog fa-spin"></i> BUILDING...';
                Playback.active = false;

                try {
                    // 1. Files
                    let inputs = [];
                    let mediaIndices = {};
                    let inputCount = 0;
                    
                    for(const mid in Project.media) {
                        const m = Project.media[mid];
                        const name = `src_${mid}.mp4`;
                        ffmpeg.FS('writeFile', name, await fetchFile(m.file));
                        inputs.push('-i', name);
                        mediaIndices[mid] = inputCount++;
                    }

                    // 2. Filter Graph
                    let fc = [`color=c=black:s=1280x720:d=${Project.duration}[bg]`];
                    let last = '[bg]';
                    let layerIdx = 0;

                    Project.tracks.forEach(track => {
                        if(track.type !== 'video') return;
                        track.clips.forEach(clip => {
                            const idx = mediaIndices[clip.mid];
                            const label = `l${layerIdx}`;
                            
                            // Chains
                            const scale = `[${idx}:v]scale=iw*${clip.scale}:-1,format=rgba`;
                            const fx = `eq=brightness=${clip.bright}:contrast=${clip.cont}:saturation=${clip.sat}`;
                            // The crucial setpts: aligns clip start time
                            const pts = `setpts=PTS-STARTPTS+${clip.start}/TB`;
                            
                            fc.push(`${scale},${fx},${pts}[${label}_src]`);
                            
                            // Overlay
                            const x = `(W-w)/2+${clip.x}`;
                            const y = `(H-h)/2+${clip.y}`;
                            const enable = `enable='between(t,${clip.start},${clip.start+clip.duration})'`;
                            
                            fc.push(`${last}[${label}_src]overlay=x=${x}:y=${y}:${enable}:format=auto[tmp${layerIdx}]`);
                            last = `[tmp${layerIdx}]`;
                            layerIdx++;
                        });
                    });

                    // 3. Run
                    const cmd = [...inputs, '-filter_complex', fc.join(';'), '-map', last, '-c:v', 'libx264', '-preset', 'ultrafast', 'out.mp4'];
                    
                    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> ENCODING...';
                    await ffmpeg.run(...cmd);

                    const d = ffmpeg.FS('readFile', 'out.mp4');
                    const url = URL.createObjectURL(new Blob([d.buffer], {type:'video/mp4'}));
                    const a = document.createElement('a'); a.href=url; a.download='Onevima_Export.mp4'; a.click();
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> DONE';
                    setTimeout(() => { btn.innerHTML='<i class="fas fa-bolt"></i> EXPORT'; btn.disabled=false; }, 2000);

                } catch(e) {
                    console.error(e);
                    btn.innerHTML = 'ERROR'; btn.disabled=false;
                    alert("Export Error. Check Console.");
                }
            }
        };

        document.getElementById('upl').onchange = e => App.addMedia(e.target.files);
        App.init();
    </script>
</body>
